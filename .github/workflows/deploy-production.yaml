name: CD-Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag to deploy. Leave empty to build and deploy the current commit SHA.
        required: false
        type: string

concurrency:
  group: dashboard-production-deploy
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Ensure production deploy runs from main
        if: ${{ github.ref_name != 'main' }}
        run: |
          echo "Production deploys must be run from the main branch."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: image-tag
        run: echo "value=${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: luden-labs-ltd
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        if: ${{ inputs.image_tag == '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/luden-labs-ltd/enola_dashboard-next-js:prod-latest
            ghcr.io/luden-labs-ltd/enola_dashboard-next-js:${{ github.sha }}

      - name: Validate deploy config
        run: |
          test -n "${{ vars.SSH_HOST }}" || (echo "Missing Production variable SSH_HOST" && exit 1)
          test -n "${{ vars.SSH_USER }}" || (echo "Missing Production variable SSH_USER" && exit 1)
          test -n "${{ vars.DEPLOY_PATH }}" || (echo "Missing Production variable DEPLOY_PATH" && exit 1)
          test -n "${{ vars.BASE_URL_BACKEND }}" || (echo "Missing Production variable BASE_URL_BACKEND" && exit 1)
          test -n "${{ vars.SENTRY_DSN }}" || (echo "Missing Production variable SENTRY_DSN" && exit 1)
          test -n "${{ secrets.SSH_KEY }}" || (echo "Missing Production secret SSH_KEY" && exit 1)
          test -n "${{ secrets.GHCR_PAT }}" || (echo "Missing Production secret GHCR_PAT" && exit 1)

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            cat > .env << 'EOF'
            BASE_URL_BACKEND=${{ vars.BASE_URL_BACKEND }}
            SENTRY_DSN=${{ vars.SENTRY_DSN }}
            IMAGE_TAG=${{ steps.image-tag.outputs.value }}
            EOF
            docker compose pull production
            docker compose up -d --force-recreate production
            healthy=0
            for attempt in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:3000/ > /dev/null; then
                healthy=1
                break
              fi
              sleep 3
            done
            if [ "$healthy" -ne 1 ]; then
              echo "Production healthcheck failed on 127.0.0.1:3000"
              exit 1
            fi
            docker image prune -af
