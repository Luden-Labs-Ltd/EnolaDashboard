version: "3.8"

services:
  development:
    build:
      context: .
      dockerfile: Dockerfile
      target: development # Use the 'development' stage from Dockerfile for development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: npm run dev

  qa:
    build:
      context: .
      dockerfile: Dockerfile
      target: production # Use the 'production' stage from Dockerfile for production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=16384
    env_file:
      - .env
    restart: unless-stopped

  production:
    build:
      context: .
      dockerfile: Dockerfile
      target: production # Use the 'production' stage from Dockerfile for production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=16384
    env_file:
      - .env.production
    restart: unless-stopped
